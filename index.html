<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A beautiful and dynamic modern website boilerplate.">
    <title>Modern Boilerplate</title>
    <!-- modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- custom styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow" aria-hidden="true" id="glow"></div>
    
    <main>
        <h1>Welcome Additions</h1>
        <p>This is a premium, high-performance HTML/CSS/JS boilerplate with a dynamic glassmorphic aesthetic.</p>
        
        <div class="glass-card">
            <h2 id="card-heading" style="font-weight: 600; margin-bottom: 1rem; font-size: 1.5rem;">Interactive Element</h2>
            <p style="font-size: 1rem; margin-bottom: 1.5rem; animation: none; transform: none; opacity: 1;">Hover or click below to see micro-interactions in action.</p>
            <button class="btn" id="actionBtn" aria-labelledby="card-heading">Click Me</button>
        </div>
    </main>

    <!-- custom logic -->
    <script src="script.js"></script>
</body>
</html>
